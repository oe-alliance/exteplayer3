name: Compile exteplayer3

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          autoconf \
          automake \
          libtool \
          libavformat-dev \
          libavcodec-dev \
          libavutil-dev \
          libswresample-dev \
          libswscale-dev \
          libxml2-dev \
          libssl-dev \
          libbluray-dev \
          librtmp-dev \
          libudfread-dev \
          libasound2-dev \
          zlib1g-dev \
          libbz2-dev \
          liblzma-dev \
          libpthread-stubs0-dev

    - name: Bootstrap autotools
      run: ./autogen.sh

    - name: Configure
      run: ./configure

    - name: Compile exteplayer3
      run: make -j$(nproc)
